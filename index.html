  <!-- Edit Song Modal -->
  <div
    class="modal fade"
    id="edit-song-modal"
    tabindex="-1"
    aria-labelledby="editSongModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editSongModalLabel">Edit Song</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body">
          <div class="mb-4">
            <label for="edit-song-input" class="form-label">Song</label>
            <input type="text" class="form-control" id="edit-song-input" />
          </div>
          <div class="mb-4">
            <label for="edit-artist-input" class="form-label">Artist</label>
            <input type="text" class="form-control" id="edit-artist-input" />
          </div>
          <div class="mb-4">
            <label for="edit-bpm-input" class="form-label">BPM</label>
            <input type="text" class="form-control" id="edit-bpm-input" />
          </div>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-outline-secondary"
            data-bs-dismiss="modal"
          >
            Cancel
          </button>
          <button type="button" class="btn btn-primary" id="edit-save-button">
            Save
          </button>
        </div>
      </div>
    </div>
  </div>
  <body class="body">
    <div id="app">
      <!-- <h1>Kennet's DJ Tracker</h1> -->
      <form id="new-song-form" class="search-wrapper">
        <input
          id="song-input"
          class="form-control"
          type="text"
          placeholder="Song"
        />
        <input
          id="artist-input"
          class="form-control"
          type="text"
          placeholder="Artist"
        />
        <input
          id="BPM-input"
          class="form-control"
          type="text"
          placeholder="BPM"
          style="max-width: 80px"
        />
        <button
          id="add-song-top-button"
          class="btn btn-primary"
          type="button"
          disabled
        >
          <i class="bi bi-arrow-up-circle"></i>
        </button>
        <button
          id="add-song-bottom-button"
          class="btn btn-primary"
          type="button"
          disabled
        >
          <i class="bi bi-arrow-down-circle"></i>
        </button>
      </form>
      <div id="gallery" class="gallery"></div>
